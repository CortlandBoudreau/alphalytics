session: 2026-06-22
branch: fix/digest-scheduler

accomplished:
  - New branch fix/digest-scheduler created from feat/portfolio-email-digest
  - Three scheduler bugs fixed:
      1. APScheduler misfire_grace_time added (900s = 15 min). Without this, if Railway
         is even 1 second late delivering the job, APScheduler silently drops the email
         for that day. This is the most likely reason scheduled emails never arrived.
      2. CronTrigger timezone made explicit (pytz.UTC). Without this, APScheduler uses
         the container's local timezone — undefined behaviour if Railway ever changes it.
      3. digestEnabled frontend default changed from false → true. Previously, opening
         the app on a fresh browser/device set digestEnabled=false in localStorage, and
         the mount-time useEffect auto-synced that false to Redis, silently disabling
         the scheduled digest even if the user had enabled it elsewhere.
  - Removed debug console.log lines from Portfolio.tsx fetchSectors (noted in prior handoff)

